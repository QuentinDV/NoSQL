services:
  mongo:
    image: mongo:7
    container_name: radiostream-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: radiostream-api
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: radiostream
    ports:
      - "5000:5000"

volumes:
  mongo_data:
